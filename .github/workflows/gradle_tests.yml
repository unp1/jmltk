name: Tests

on:
  # Trigger the workflow on push to master (ignoring .md only changes)
  push:
    branches:
      - master
      - devel
    paths-ignore:
      - '**.md'

  # Trigger the workflow on any pull_request (ignoring .md only changes)
  pull_request:
    paths-ignore:
      - '**.md'
      - doc
      - dev-files

  # Enable manual triggering (important for contributors to enable a check on their fork)
  workflow_dispatch:

# If a build is running in the current branch, and the branch is updated, we cancel the previous build and start
# a new one with the updated changes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  code-quality: write

jobs:
  gradle_test_on_merge:
    strategy:
      ## Optionally cancel all other combinations if one fails
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ] #, macos-latest, windows-latest ]
        jdk: [ 21 ]

    env:
      OS: ${{ matrix.os }}
      JDK: ${{ matrix.jdk }}

    runs-on: ${{ matrix.os }}

    steps:
      ## Checkout the current version of the code from the repo.
      - &checkout
        name: Checkout latest code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: "0"

      ## Setup the specified version of Java (includes maven/gradle).
      - &setupjava
        name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'              # v2 requires explicitly stating the distribution - `zulu` and `adopt` supported at time of writing
          java-version: ${{ matrix.jdk }}   # Use matrix to select which JDK level to use
          java-package: jdk                 # optional (jdk or jre) - defaults to jdk
          cache: 'gradle'

      - &checkjava
        name: Echo exact java version being used
        run: java -version

      - &gradletest
        name: Test with Gradle and generate coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: |
          ./gradlew --continue --parallel test

  gradle_test_on_branch:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ] #, macos-latest, windows-latest ]
        jdk: [ 21 ]

    env:
      OS: ${{ matrix.os }}
      JDK: ${{ matrix.jdk }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: "0"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - *setupjava
      - *checkjava

      - name: Test with Gradle and generate coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --continue --parallel test aggregateCoverageReport aggregateTestReport

      - run: python scripts/cover2cover.py build/reports/jacoco/aggregateCoverageReport/aggregateCoverageReport.xml **/src/main/java > cov-report.xml
        if: success() || failure()


      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: cov-report.xml
          language: Java
          label: code-coverage/jacoco-${{matrix.os}}-${{matrix.jdk}}

      - name: Upload Test Report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: aggregated-results
          path: build/reports/tests/test/aggregated-results
          compression-level: '9'
          retention-days: 7


      - name: Upload Coverage Report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: aggregated-coverage
          path:  build/reports/jacoco/aggregateCoverageReport/html/
          compression-level: '9'
          retention-days: 7

      - name: Test reporting
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Report
          path: "*/build/test-results/test/*.xml"
          reporter: java-junit
